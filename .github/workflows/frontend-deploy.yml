name: frontend-deploy

on:
  push:
    branches:
      - main
      - master
    paths:
      - frontend/**
      - .github/workflows/frontend-deploy.yml
  workflow_dispatch:

permissions: {}

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH || format('/{0}/', github.event.repository.name) }}
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
      VITE_WS_BASE_URL: ${{ vars.VITE_WS_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Validate frontend env
        run: |
          if [ -z "$VITE_API_BASE_URL" ]; then
            echo "::error::Set the VITE_API_BASE_URL repository variable before deploying."
            exit 1
          fi

      - name: Run unit tests
        working-directory: frontend
        run: npm test -- --run

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Add SPA fallback
        working-directory: frontend
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    name: Deploy frontend
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
